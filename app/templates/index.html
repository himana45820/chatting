<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat With PDF</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
      .hero { max-width: 900px; margin: 80px auto; padding: 24px; text-align: center; }
      .card { background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 32px; }
      .btn { display: inline-block; margin-top: 20px; padding: 12px 20px; border: none; border-radius: 999px; background: #2563eb; color: white; text-decoration: none; cursor: pointer; }
      .btn:hover { background: #1d4ed8; }
    </style>
  </head>
  <body>
    <div class="hero">
      <div class="card">
        <h1>Chat With PDF</h1>
        <p>Upload one or more PDFs and chat with them using a RAG-powered assistant.</p>
        <a class="btn" href="/chat">Open Chat</a>
      </div>
    </div>
  </body>
</html>
